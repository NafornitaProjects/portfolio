name: CI/CD Monorepo
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      MONGODB_URI: ${{ secrets.DATABASE_URI }}
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v4
        with:
          context: .
          file: api/Dockerfile
          push: true
          build-args: |
            MONGODB_URI=${{ env.MONGODB_URI }}
            PAYLOAD_SECRET=${{ env.PAYLOAD_SECRET }}
          tags: |
            ${{ secrets.REGISTRY }}/api:${{ github.sha }}
            ${{ secrets.REGISTRY }}/api:latest

  build-and-push-www:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v4
        with:
          context: .
          file: www/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/www:${{ github.sha }}
            ${{ secrets.REGISTRY }}/www:latest

  deploy-api:
    needs: build-and-push-api
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: azure/setup-kubectl@v3
      - run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV
      - run: |
          kubectl apply -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: api
            namespace: default
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: api
            template:
              metadata:
                labels:
                  app: api
              spec:
                containers:
                - name: api
                  image: ${{ secrets.REGISTRY }}/api:${{ github.sha }}
                  ports:
                  - containerPort: 3000
                  envFrom:
                  - secretRef:
                      name: api-credentials
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: api-service
            namespace: default
          spec:
            type: ClusterIP
            selector:
              app: api
            ports:
            - protocol: TCP
              port: 80
              targetPort: 3000
          ---
          apiVersion: networking.istio.io/v1alpha3
          kind: VirtualService
          metadata:
            name: api-virtualservice
            namespace: istio-system
          spec:
            hosts:
            - "api.edwardnafornita.com"
            gateways:
            - internal-api-gateway
            http:
            - match:
              - uri:
                  prefix: "/"
              route:
              - destination:
                  host: api-service.default.svc.cluster.local
                  port:
                    number: 80
          ---
          apiVersion: security.istio.io/v1beta1
          kind: AuthorizationPolicy
          metadata:
            name: api-internal-only
            namespace: default
          spec:
            selector:
              matchLabels:
                app: api
            action: ALLOW
            rules:
            - from:
              - source:
                  ipBlocks:
                  - "192.168.50.0/24"
          EOF

  deploy-www:
    needs: build-and-push-www
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: azure/setup-kubectl@v3
      - run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV
      - run: |
          kubectl apply -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: www
            namespace: default
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: www
            template:
              metadata:
                labels:
                  app: www
              spec:
                containers:
                - name: www
                  image: ${{ secrets.REGISTRY }}/www:${{ github.sha }}
                  ports:
                  - containerPort: 80
          EOF
