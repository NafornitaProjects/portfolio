name: CI/CD Monorepo

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Secret validation step (without exposing values)
      - name: Validate Secrets
        run: |
          if [ -z "$DATABASE_URI" ]; then
            echo "::error::DATABASE_URI secret is not set"
            exit 1
          fi

          if [[ ! "$DATABASE_URI" =~ ^mongodb:// && ! "$DATABASE_URI" =~ ^mongodb\+srv:// ]]; then
            echo "::error::DATABASE_URI must start with mongodb:// or mongodb+srv://"
            exit 1
          fi

          if [ -z "$PAYLOAD_SECRET" ]; then
            echo "::error::PAYLOAD_SECRET secret is not set"
            exit 1
          fi

          echo "All secrets validated successfully"
        env:
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}

      - uses: docker/build-push-action@v4
        with:
          context: .
          file: ./api/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/api:${{ github.sha }}
            ${{ secrets.REGISTRY }}/api:latest
          # Pass only as secrets, not as build args
          secrets: |
            mongodb_uri=${{ secrets.DATABASE_URI }}
            payload_secret=${{ secrets.PAYLOAD_SECRET }}

      - uses: docker/build-push-action@v4
        with:
          context: .
          file: ./www/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/www:${{ github.sha }}
            ${{ secrets.REGISTRY }}/www:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: NafornitaProjects/helm-charts
          token: ${{ secrets.GITHUB_TOKEN }}
          path: helm-charts

      - uses: azure/setup-kubectl@v3
        with:
          version: latest

      - uses: azure/setup-helm@v1

      - run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      - run: |
          mkdir -p manifests
          helm template api helm-charts/api \
            --namespace prod \
            --set image.repository=${{ secrets.REGISTRY }}/api \
            --set image.tag=${{ github.sha }} \
            > manifests/api.yaml
          helm template www helm-charts/www \
            --namespace prod \
            --set image.repository=${{ secrets.REGISTRY }}/www \
            --set image.tag=${{ github.sha }} \
            > manifests/www.yaml

      - run: kubectl apply -f manifests/