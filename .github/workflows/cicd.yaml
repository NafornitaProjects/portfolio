name: CI/CD Monorepo

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/build-push-action@v3
        with:
          context: .
          file: ./api/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/api:${{ github.sha }}
            ${{ secrets.REGISTRY }}/api:latest
          secrets: |
            "mongodb_uri=${{ secrets.DATABASE_URI }}"
            "payload_secret=${{ secrets.PAYLOAD_SECRET }}"

      - uses: docker/build-push-action@v3
        with:
          context: .
          file: ./www/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/www:${{ github.sha }}
            ${{ secrets.REGISTRY }}/www:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: NafornitaProjects/helm-charts
          token: ${{ secrets.GITHUB_TOKEN }}
          path: helm-charts

      - uses: azure/setup-kubectl@v3
        with:
          version: latest

      - uses: azure/setup-helm@v1

      - run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      - run: |
          mkdir -p manifests
          helm template api helm-charts/api \
            --namespace prod \
            --set image.repository=${{ secrets.REGISTRY }}/api \
            --set image.tag=${{ github.sha }} \
            > manifests/api.yaml
          helm template www helm-charts/www \
            --namespace prod \
            --set image.repository=${{ secrets.REGISTRY }}/www \
            --set image.tag=${{ github.sha }} \
            > manifests/www.yaml

      - run: kubectl apply -f manifests/
