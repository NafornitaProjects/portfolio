name: CI/CD Monorepo
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-api:
    runs-on: [self-hosted, k8s]
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Load kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

      - name: Fetch secrets
        run: |
          MONGODB_B64=$(kubectl get secret api-credentials -n default -o jsonpath="{.data.MONGODB_URI}")
          PAYLOAD_B64=$(kubectl get secret api-credentials -n default -o jsonpath="{.data.PAYLOAD_SECRET}")
          echo "$MONGODB_B64" | base64 -d > MONGODB_URI.txt
          echo "$PAYLOAD_B64" | base64 -d > PAYLOAD_SECRET.txt

      - uses: docker/setup-buildx-action@v3

      - name: Build API image (no push)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: api/Dockerfile
          push: false
          cache-to: type=inline
          secrets: |
            id=MONGODB_URI,src=MONGODB_URI.txt
            id=PAYLOAD_SECRET,src=PAYLOAD_SECRET.txt
          tags: |
            api:${{ github.sha }}

  push-api:
    needs: build-api
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Push API image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: api/Dockerfile
          push: true
          cache-from: type=inline
          tags: |
            ${{ secrets.REGISTRY }}/api:${{ github.sha }}
            ${{ secrets.REGISTRY }}/api:latest

  build-www:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build WWW image (no push)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: www/Dockerfile
          push: false
          cache-to: type=inline
          tags: |
            www:${{ github.sha }}

  push-www:
    needs: build-www
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Push WWW image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: www/Dockerfile
          push: true
          cache-from: type=inline
          tags: |
            ${{ secrets.REGISTRY }}/www:${{ github.sha }}
            ${{ secrets.REGISTRY }}/www:latest

  deploy-api:
    needs: push-api
    runs-on: [self-hosted, k8s]

    steps:
      - uses: azure/setup-kubectl@v3
      - name: Load kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

      - name: Apply API manifests (locked-down)
        env:
          IMAGE: ${{ secrets.REGISTRY }}/api:${{ github.sha }}
        run: |
          kubectl apply -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: api
            namespace: default
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: api
            template:
              metadata:
                labels:
                  app: api
              spec:
                containers:
                  - name: api
                    image: ${IMAGE}
                    ports:
                      - containerPort: 3000
                    envFrom:
                      - secretRef:
                          name: api-credentials
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: api-service
            namespace: default
          spec:
            type: ClusterIP
            selector:
              app: api
            ports:
              - protocol: TCP
                port: 80
                targetPort: 3000
          ---
          apiVersion: networking.istio.io/v1alpha3
          kind: Gateway
          metadata:
            name: internal-api-gateway
            namespace: istio-system
          spec:
            selector:
              istio: ingressgateway
            servers:
              - port:
                  number: 80
                  name: http-internal
                  protocol: HTTP
                hosts:
                  - "api.edwardnafornita.com"
          ---
          apiVersion: networking.istio.io/v1alpha3
          kind: VirtualService
          metadata:
            name: api-virtualservice
            namespace: istio-system
          spec:
            hosts:
              - "api.edwardnafornita.com"
            gateways:
              - internal-api-gateway
            http:
              - match:
                  - uri:
                      prefix: "/"
                route:
                  - destination:
                      host: api-service.default.svc.cluster.local
                      port:
                        number: 80
          ---
          apiVersion: security.istio.io/v1beta1
          kind: AuthorizationPolicy
          metadata:
            name: api-internal-only
            namespace: default
          spec:
            selector:
              matchLabels:
                app: api
            action: ALLOW
            rules:
              - from:
                  - source:
                      ipBlocks:
                        - "192.168.50.0/24"
          EOF

  deploy-www:
    needs: push-www
    runs-on: [self-hosted, k8s]

    steps:
      - uses: azure/setup-kubectl@v3
      - name: Load kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

      - name: Apply WWW manifests
        env:
          IMAGE: ${{ secrets.REGISTRY }}/www:${{ github.sha }}
        run: |
          kubectl apply -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: www
            namespace: default
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: www
            template:
              metadata:
                labels:
                  app: www
              spec:
                containers:
                  - name: www
                    image: ${IMAGE}
                    ports:
                      - containerPort: 80
          EOF
