name: CI/CD Monorepo
on:
  push:
    branches: [ main ]

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        run: |
          die() { echo "::error::$1"; exit 1; }
          [[ -z "$DATABASE_URI"      ]] && die "DATABASE_URI not set"
          [[ $DATABASE_URI =~ ^mongodb://|^mongodb\+srv:// ]] || \
            die "DATABASE_URI must start with mongodb:// or mongodb+srv://"
          [[ -z "$PAYLOAD_SECRET"    ]] && die "PAYLOAD_SECRET not set"
          [[ -z "$KUBE_CONFIG"       ]] && die "KUBE_CONFIG not set"
        env:
          DATABASE_URI:   ${{ secrets.DATABASE_URI }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          KUBE_CONFIG:    ${{ secrets.KUBE_CONFIG }}

  build-push-api:
    needs: validate-secrets
    runs-on: ubuntu-latest
    permissions: { packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY }}
          username:  ${{ secrets.REGISTRY_USERNAME }}
          password:  ${{ secrets.REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v4
        with:
          context: .
          file:   ./api/Dockerfile
          push:   true
          tags: |
            ${{ secrets.REGISTRY }}/api:${{ github.sha }}
            ${{ secrets.REGISTRY }}/api:latest
          secrets: |
            mongodb_uri=${{ secrets.DATABASE_URI }}
            payload_secret=${{ secrets.PAYLOAD_SECRET }}

  build-push-www:
    needs: validate-secrets
    runs-on: ubuntu-latest
    permissions: { packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY }}
          username:  ${{ secrets.REGISTRY_USERNAME }}
          password:  ${{ secrets.REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v4
        with:
          context: .
          file:   ./www/Dockerfile
          push:   true
          tags: |
            ${{ secrets.REGISTRY }}/www:${{ github.sha }}
            ${{ secrets.REGISTRY }}/www:latest

  deploy-api:
    needs: build-push-api
    runs-on: ubuntu-latest
    steps:
      - name: Set up kubectl & kubeconfig
        uses: azure/setup-kubectl@v3
      - run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

      - name: Apply API manifests
        env:
          IMAGE:  ${{ secrets.REGISTRY }}/api:${{ github.sha }}
        run: |
          # -- Deployment + Service + VirtualService for api.edwardnafornita.com
          kubectl apply -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: api
            namespace: default
          spec:
            replicas: 1
            selector:
              matchLabels: { app: api }
            template:
              metadata: { labels: { app: api } }
              spec:
                containers:
                  - name: api
                    image: ${IMAGE}
                    ports: [{ containerPort: 3000 }]
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: api-service
            namespace: default
          spec:
            selector: { app: api }
            ports:
              - protocol: TCP
                port: 80
                targetPort: 3000
          ---
          apiVersion: networking.istio.io/v1alpha3
          kind: VirtualService
          metadata:
            name: api-virtualservice
            namespace: istio-system
          spec:
            hosts: [ "api.edwardnafornita.com" ]
            gateways: [ "edwardnafornita-gateway" ]
            http:
              - match:
                  - port: 80
                redirect: { scheme: https }
              - match:
                  - uri: { prefix: "/" }
                route:
                  - destination:
                      host: api-service.default.svc.cluster.local
                      port: { number: 80 }
          EOF

  deploy-www:
    needs: build-push-www
    runs-on: ubuntu-latest
    steps:
      - name: Set up kubectl & kubeconfig
        uses: azure/setup-kubectl@v3
      - run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

      - name: Apply WWW manifests
        env:
          IMAGE:  ${{ secrets.REGISTRY }}/www:${{ github.sha }}
        run: |
          # -- Deployment + Service + VirtualService for www.edwardnafornita.com
          kubectl apply -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: www
            namespace: default
          spec:
            replicas: 1
            selector:
              matchLabels: { app: www }
            template:
              metadata: { labels: { app: www } }
              spec:
                containers:
                  - name: www
                    image: ${IMAGE}
                    ports: [{ containerPort: 80 }]
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: www-service
            namespace: default
          spec:
            selector: { app: www }
            ports:
              - protocol: TCP
                port: 80
                targetPort: 80
          ---
          apiVersion: networking.istio.io/v1alpha3
          kind: VirtualService
          metadata:
            name: www-virtualservice
            namespace: istio-system
          spec:
            hosts: [ "www.edwardnafornita.com" ]
            gateways: [ "edwardnafornita-gateway" ]
            http:
              - match:
                  - port: 80
                redirect: { scheme: https }
              - match:
                  - uri: { prefix: "/" }
                route:
                  - destination:
                      host: www-service.default.svc.cluster.local
                      port: { number: 80 }
          EOF
